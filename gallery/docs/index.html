<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>資料集 | さんそん兄妹の活動記録</title>
  <meta name="description" content="設定・用語・補足情報をまとめる資料集です。" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body>
  <header>
    <nav></nav>
  </header>
  <main>
    <section class="page-hero">
      <span class="eyebrow">Docs</span>
      <h1>資料集</h1>
      <p class="lead">配信や動画だけでは拾いきれない設定、補足、用語などをまとめるページです。琴音の整理感がもっとも見えやすい場所として、静かに増やしていく想定です。</p>
    </section>
    <section class="page-section">
      <div class="card-grid two">
        <article class="page-card">
          <span class="card-kicker">今後の想定</span>
          <h3>入れていく情報</h3>
          <p>活動の背景、モチーフ、簡単な用語集、兄妹の役割が見える補足など、あとから読み返したくなる情報を想定しています。</p>
        </article>
        <article class="page-card">
          <span class="card-kicker">方針</span>
          <h3>読みやすさを最優先</h3>
          <p>量を増やすより、必要なときにすぐ見つかることを重視します。実装もシンプルな静的構成を保ったまま拡張できるようにしています。</p>
        </article>
      </div>
    </section>
  </main>
  <script src="../../assets/js/main.js"></script>
</body>
</html>
