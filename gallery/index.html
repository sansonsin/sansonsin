<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ギャラリー | さんそん兄妹の活動記録</title>
  <meta name="description" content="写真、ファンアート、資料集への入口ページです。" />
  <link rel="icon" href="../favicon.ico?v=1" type="image/x-icon" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header>
    <nav></nav>
  </header>
  <main>
    <section class="page-hero">
      <span class="eyebrow">Gallery</span>
      <h1>作品や記録を静かに見て回れるギャラリー</h1>
      <p class="lead">写真、ファンアート、資料集を分けて整理しています。配信や動画だけでは見えにくい、さんそん兄妹の活動の空気感をたどれます。</p>
    </section>

    <section class="page-section">
      <div class="gallery-grid">
        <a href="photos/">
          <span class="choice-tag">Photo</span>
          <h3>写真</h3>
          <p>活動の雰囲気やモチーフを、視覚的にやわらかく見られる記録です。</p>
        </a>
        <a href="fanart/">
          <span class="choice-tag">Fan Art</span>
          <h3>ファンアート</h3>
          <p>いただいた作品や、創作の広がりを感じられるものをまとめています。</p>
        </a>
        <a href="docs/">
          <span class="choice-tag">Docs</span>
          <h3>資料集</h3>
          <p>設定、用語、活動の補足など、落ち着いて読みたい情報をまとめています。</p>
        </a>
      </div>
    </section>
  </main>
  <script src="../assets/js/main.js"></script>
</body>
</html>
