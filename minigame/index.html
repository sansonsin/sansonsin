<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Games | Sansonsin</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header>
    <h1>Mini Games</h1>
    <nav>
      <a href="../">TOP</a>
      <a href="../profile/">Profile</a>
      <a href="../reality/">Reality</a>
      <a href="../youtube/">YouTube</a>
      <a href="../gallery/">Gallery</a>
      <a href="../news/">News</a>
      <a href="../links/">Links</a>
    </nav>
  </header>
  <main>
    <section class="panel">
      <h2>ミニゲームを選んでスタート</h2>
      <p>ここから3つのゲームを選べます。気になるリンクを押すと、そのままゲームページが開いてすぐ遊べます。</p>
    </section>
    <section class="game-grid">
      <div class="choice-grid">
        <a class="choice-card" href="./runner/">
          <span class="choice-tag">Action</span>
          <h3>Sky Runner</h3>
          <p>ジャンプで障害物をかわしながら空のコースを走り抜けるランゲームです。</p>
        </a>
        <a class="choice-card" href="./tank/">
          <span class="choice-tag">Battle</span>
          <h3>Tank Arena</h3>
          <p>敵タンクを撃ち抜きながら生き残る、見下ろし型のアクションシューティングです。</p>
        </a>
        <a class="choice-card" href="./pong/">
          <span class="choice-tag">Arcade</span>
          <h3>Pixel Pong</h3>
          <p>ラリーが続くほど速くなる、1対1のピンポンゲームです。</p>
        </a>
      </div>
    </section>
  </main>
  <script src="../assets/js/main.js"></script>
</body>
</html>
