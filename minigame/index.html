<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Games | さんそん兄妹の活動記録</title>
  <meta name="description" content="動きのある3つのミニゲームを遊べるページです。" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header>
    <nav></nav>
  </header>
  <main>
    <section class="page-hero">
      <span class="eyebrow">Mini Games</span>
      <h1>気分転換に遊べる、小さなアーケード</h1>
      <p class="lead">このページでは3つのゲームから選んで遊べます。配信や作品の合間に立ち寄れる、ちょっとした寄り道コーナーです。リンクを押すと、そのままゲームページが開いてすぐに始まります。</p>
    </section>

    <section class="page-section">
      <div class="choice-grid">
        <a class="choice-card" href="./runner/">
          <span class="choice-tag">Action</span>
          <h3>Sky Runner</h3>
          <p>ジャンプで障害物をかわしながら走るアクション。テンポよく遊びたいとき向けです。</p>
        </a>
        <a class="choice-card" href="./tank/">
          <span class="choice-tag">Battle</span>
          <h3>Tank Arena</h3>
          <p>敵タンクを避けながら撃ち返す、見下ろし型のバトルゲームです。</p>
        </a>
        <a class="choice-card" href="./pong/">
          <span class="choice-tag">Arcade</span>
          <h3>Pixel Pong</h3>
          <p>ラリーが伸びるほど白熱する、シンプルで遊びやすいピンポンゲームです。</p>
        </a>
      </div>
    </section>
  </main>
  <script src="../assets/js/main.js"></script>
</body>
</html>
