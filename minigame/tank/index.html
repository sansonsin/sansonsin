<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tank Arena | Sansonsin</title>
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body>
  <header>
    <h1>Tank Arena</h1>
    <nav>
      <a href="../../">TOP</a>
      <a href="../../minigame/">Mini Games</a>
    </nav>
  </header>
  <main>
    <section class="panel">
      <h2>敵タンクを迎え撃つ</h2>
      <p>矢印キーで移動、スペースキーで発射。被弾を避けながらスコアを伸ばしてください。</p>
    </section>
    <section class="game-shell">
      <div class="hud">
        <p id="tank-score">Score: 0 / HP: 5</p>
        <div class="button-row">
          <button id="tank-start" type="button">スタート / リスタート</button>
          <a class="choice-card" href="../" style="padding:0.65rem 1rem;">ゲーム一覧へ戻る</a>
        </div>
      </div>
      <canvas id="tank-canvas" class="game-canvas" width="900" height="520"></canvas>
      <p class="game-note" id="tank-status">スタートで戦闘開始です。</p>
    </section>
  </main>
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/tank-game.js"></script>
</body>
</html>
