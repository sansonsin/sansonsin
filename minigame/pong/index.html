<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Pong | さんそん兄妹の活動記録</title>
  <meta name="description" content="シンプルに遊べるピンポンゲームです。" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body>
  <header>
    <nav></nav>
  </header>
  <main>
    <section class="page-hero">
      <span class="eyebrow">Pixel Pong</span>
      <h1>シンプルで気持ちいい、王道ピンポンゲーム</h1>
      <p class="lead">上矢印と下矢印でラケットを動かし、CPUより先に5点を取ると勝利です。テンポよく遊べるよう、すぐ再戦できる作りにしています。</p>
    </section>
    <section class="page-section game-shell">
      <div class="hud">
        <p id="pong-score">Player 0 - 0 CPU</p>
        <div class="button-row">
          <button id="pong-start" type="button">スタート / リスタート</button>
          <a class="button-link secondary" href="../">ゲーム一覧へ戻る</a>
        </div>
      </div>
      <canvas id="pong-canvas" class="game-canvas" width="900" height="500"></canvas>
      <div class="touch-controls two">
        <button data-pong="up" type="button">上へ</button>
        <button data-pong="down" type="button">下へ</button>
      </div>
      <p class="game-note" id="pong-status">ゲームを準備しています。</p>
    </section>
  </main>
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/pong-game.js"></script>
</body>
</html>
