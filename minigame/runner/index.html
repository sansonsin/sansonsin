<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Runner | さんそん兄妹の活動記録</title>
  <meta name="description" content="ジャンプで障害物を避けるランゲームです。" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body>
  <header>
    <nav></nav>
  </header>
  <main>
    <section class="page-hero">
      <span class="eyebrow">Sky Runner</span>
      <h1>空色のコースを駆け抜けるランゲーム</h1>
      <p class="lead">スペースキーか上矢印でジャンプ。障害物を避けながら、浮かぶコインを拾ってスコアを伸ばしてください。スマホでは画面タップでも跳べます。</p>
    </section>
    <section class="page-section game-shell">
      <div class="hud">
        <p id="runner-score">Score: 0</p>
        <div class="button-row">
          <button id="runner-start" type="button">スタート / リスタート</button>
          <a class="button-link secondary" href="../">ゲーム一覧へ戻る</a>
        </div>
      </div>
      <canvas id="runner-canvas" class="game-canvas" width="900" height="420"></canvas>
      <div class="touch-controls two">
        <button id="runner-jump" type="button">ジャンプ</button>
        <button id="runner-restart-mobile" type="button">リスタート</button>
      </div>
      <p class="game-note" id="runner-status">ゲームを準備しています。</p>
    </section>
  </main>
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/runner-game.js"></script>
</body>
</html>
